# ─────────────────────────────────────────────────
#  15-MIN BTC PREDICTION BOT  ·  Configuration
# ─────────────────────────────────────────────────

kalshi:
  base_url: "https://api.elections.kalshi.com/trade-api/v2"
  ws_url: "wss://api.elections.kalshi.com/trade-api/ws/v2"
  # Credentials loaded from .env (KALSHI_EMAIL / KALSHI_PASSWORD / KALSHI_API_KEY)
  series_ticker: "KXBTC15M"      # The BTC 15-min Up/Down series
  order_type: "limit"            # limit | market
  # How far off mid-price to post limit orders (in cents, 0-100 scale)
  limit_slippage_cents: 2

feeds:
  kraken_ws_url: "wss://ws.kraken.com/v2"   # primary — CF Benchmarks constituent exchange
  # Backup feeds (REST polling if WS drops)
  coinbase_rest_url: "https://api.coinbase.com/v2/prices/BTC-USD/spot"
  kraken_rest_url: "https://api.kraken.com/0/public/Ticker?pair=XBTUSD"
  # Aggregation window for OHLCV bars (seconds)
  bar_interval_sec: 60
  # How many bars to keep in memory for indicators
  lookback_bars: 200

models:
  # Minimum model confidence to generate a signal (0.0–1.0)
  min_confidence: 0.50
  # Minimum expected value edge over Kalshi price to trade
  min_edge: 0.03          # e.g. our prob=0.72 vs Kalshi YES price=0.68
  # Weights for ensemble (must sum to 1.0)
  ensemble_weights:
    binary_options_model: 0.40   # Black-Scholes-style probability
    technical_momentum:   0.30   # RSI/MACD/BB composite
    trend_regression:     0.20   # Linear regression slope
    ml_model:             0.10   # LightGBM (requires training data)
  # Technical indicators config
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bb_period: 20
  bb_std: 2.0
  # Annualized BTC volatility estimate (overridden by realized vol when enough data)
  default_annual_vol: 0.80

strategy:
  # Don't enter if less than this many seconds remain in the 15-min window
  min_seconds_remaining: 60
  # Don't enter if more than this many seconds remain (too uncertain)
  max_seconds_remaining: 870    # just under 15 minutes — allow near-open entries
  # Preferred entry window: 5–10 minutes remaining (high conviction zone)
  preferred_entry_window_sec: [300, 600]
  # Auto-trading enabled (set to false to run in signal-only / paper mode)
  auto_trade: false
  # Paper trading mode (logs trades but doesn't execute)
  paper_trade: true
  # Max simultaneous open positions
  max_open_positions: 12
  # Side filter: "both" | "yes" | "no"
  allowed_sides: "both"

  # ── Active position management ──────────────────────────────────────────
  # Exit early when unrealized gain reaches this % of entry price
  take_profit_pct: 0.65      # e.g. bought NO at 25¢, exit when bid hits 41¢
  # Exit early when unrealized loss reaches this % of entry price
  stop_loss_pct: 0.35        # e.g. bought NO at 25¢, exit when bid drops to 16¢
  # Flip to opposite side if model signals reverse with at least this edge
  flip_min_edge: 0.10        # 10% edge required to flip (lowered from 0.12 — catches more reversals)
  # Lock in profits in the final N seconds if we're up > 10%
  lock_profit_seconds: 120   # last 2 minutes: sell winners, don't let them expire
  # Trailing stop: activates once position is up trail_activate_pct,
  # exits if the gain retraces more than trail_retracement_pct of the peak
  # e.g. peak=48% → floor=24% (exits if drops back below 24% gain)
  trail_activate_pct: 0.20
  trail_retracement_pct: 0.50

  # ── Re-entry protection ──────────────────────────────────────────────────
  # Skip contracts already at penny prices — market has already decided direction
  min_entry_price_cents: 10
  # After a stop-loss, block re-entry on the same ticker for this many seconds
  # Prevents the "stop-loss loop" where the engine re-enters every 5s on a losing candle
  stop_loss_cooldown_seconds: 120
  # ── Cheap-entry cost cap ─────────────────────────────────────────────────
  # Kelly at 3-10¢ entries produces hundreds of contracts — cap dollar exposure
  cheap_entry_threshold_cents: 25   # apply cap when price < 25¢
  max_cost_cheap_entry_usd: 4.00    # max ~$4 risk on any cheap entry
  # ── Per-candle loss brake ─────────────────────────────────────────────────
  # Block further auto entries on a ticker if cumulative session loss exceeds threshold
  per_candle_max_loss_usd: 8.00

personas:
  sniper:
    enabled: true
    budget_pct: 0.50           # 50% of daily risk budget
    min_confidence: 0.75       # raised from 0.70 — only very high conviction entries
    min_edge: 0.05             # 5% edge required
    kelly_fraction: 0.50       # half-Kelly (aggressive)
    slippage_cents: 3          # willing to pay 3¢ over mid for fast fills
    take_profit_pct: 0.50      # take profit at +50%
    stop_loss_pct: 0.25        # stop loss at -25%
    min_seconds: 180           # only trade 3-10 min window
    max_seconds: 600
    stop_loss_cooldown_seconds: 180  # no re-entry on same ticker for 3 min after SL
    trail_activate_pct: 0.20
    trail_retracement_pct: 0.50
  scalper:
    enabled: true
    budget_pct: 0.30           # 30% of daily risk budget
    min_spread_cents: 3        # only market-make when spread ≥ 3¢
    contracts_per_side: 1      # post 1 contract on each side (low exposure, scale up once validated)
    max_inventory_imbalance: 10  # max net directional contracts
    cancel_before_seconds: 120 # cancel all resting orders with < 2 min left
    min_seconds: 120
    max_seconds: 720
  arb:
    enabled: true
    budget_pct: 0.20           # 20% of daily risk budget (can exceed for true arb)
    min_arb_cents: 2           # YES+NO must cost < 98¢ for pure arb
    stat_arb_divergence: 0.15  # 15% model-vs-market divergence for stat arb
    stat_arb_min_confidence: 0.40
    max_contracts: 20
    # Stat-arb entry filter
    stat_arb_min_price_cents: 20     # skip if contract already priced <20¢ (market has made up its mind)
    # Stat-arb exits (pure arb holds to settlement — guaranteed)
    stat_arb_take_profit_pct: 0.80   # exit stat arb when up 80% (market repriced)
    stat_arb_stop_loss_pct: 0.65     # cut stat arb when down 65% (widened from 50%)
    trail_activate_pct: 0.20
    trail_retracement_pct: 0.50

    stat_arb_cut_before_seconds: 90  # cut any losing stat-arb with <90s left rather than ride to zero

risk:
  # Max simultaneous open positions (across all personas)
  max_open_positions: 6
  # Max USD to risk on a single trade
  max_trade_usd: 25.00
  # Absolute max position per market (Kalshi limit is $25k but we cap lower)
  max_position_per_market_usd: 30.00
  # Daily loss limit — bot pauses if hit
  daily_loss_limit_usd: 25.00
  # Kelly fraction multiplier (1.0 = full Kelly, 0.25 = quarter Kelly recommended)
  kelly_fraction: 0.25
  # Minimum trade size
  min_trade_usd: 1.00
  # Stop trading if win rate over last N trades drops below threshold
  win_rate_lookback: 20
  win_rate_min: 0.15

logging:
  level: "INFO"            # DEBUG | INFO | WARNING | ERROR
  log_file: "logs/bot.log"
  trade_log_file: "logs/trades.csv"
  max_log_size_mb: 50

database:
  path: "data/btc15.db"
