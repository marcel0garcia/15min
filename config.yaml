# ─────────────────────────────────────────────────
#  15-MIN BTC PREDICTION BOT  ·  Configuration
# ─────────────────────────────────────────────────

kalshi:
  base_url: "https://api.elections.kalshi.com/trade-api/v2"
  ws_url: "wss://api.elections.kalshi.com/trade-api/ws/v2"
  # Credentials loaded from .env (KALSHI_EMAIL / KALSHI_PASSWORD / KALSHI_API_KEY)
  series_ticker: "KXBTC15M"
  order_type: "limit"
  limit_slippage_cents: 2

feeds:
  coinbase_ws_url: "wss://ws-feed.exchange.coinbase.com"
  coinbase_rest_url: "https://api.exchange.coinbase.com/products/BTC-USD/ticker"
  bar_interval_sec: 60
  lookback_bars: 200

models:
  # Minimum model confidence to generate a signal (0.0–1.0)
  # NOTE: trader.min_edge (below) is the single source of truth for edge.
  min_confidence: 0.55
  # Weights for ensemble (must sum to 1.0)
  # orderbook_imbalance: real-time buy/sell pressure — highest alpha for this market
  # technical_momentum: RSI/MACD/BB composite — strong for 15-min moves
  # trend_regression:   OLS slope & R² — medium-term context
  # binary_options_model: Black-Scholes sanity check — reduced weight; becomes a step
  #                        function at short horizons
  # ml_model: LightGBM trained on historical outcomes (requires 500+ samples)
  ensemble_weights:
    orderbook_imbalance:  0.35
    technical_momentum:   0.35
    trend_regression:     0.20
    binary_options_model: 0.10
    ml_model:             0.00
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bb_period: 20
  bb_std: 2.0
  default_annual_vol: 0.80

strategy:
  min_seconds_remaining: 60
  max_seconds_remaining: 870
  preferred_entry_window_sec: [180, 600]
  auto_trade: false       # set true to enable live trading
  paper_trade: true       # always start in paper mode
  max_open_positions: 4
  allowed_sides: "both"

# ── Unified Auto-Trader ────────────────────────────────────────────────────────
# Replaces the old Sniper / Scalper / Arb persona trio.
# All decision-making flows through a single AutoTrader with time-phase logic.
trader:
  enabled: true
  budget_pct: 1.0          # fraction of bankroll available to auto-trader

  # Time-phase thresholds (seconds remaining in the 15-min window)
  #   Early  (>8 min):  GTC post_only entries + market making; 0% maker fee
  #   Prime  (3–8 min): IOC directional entries; escalates unfilled GTC
  #   Late   (<3 min):  no new entries; manage existing positions only
  early_window_min_seconds: 480   # 8 min
  prime_window_min_seconds: 180   # 3 min
  late_window_min_seconds:  60    # 1 min
  max_entry_seconds: 870          # never enter beyond 14.5 min remaining

  # Entry thresholds
  # min_confidence: 0.45 is the new conviction-weighted scale (anchored to
  # weighted-mean distance from 0.5, NOT std-dev). Looks lower than before
  # but is harder to clear — old 0.55 admitted near-neutral signals.
  min_confidence: 0.45            # minimum model confidence
  min_edge: 0.05                  # minimum edge over Kalshi mid-price
  min_entry_price_cents: 10       # skip contracts already priced below 10¢
  max_entry_price_cents: 72       # skip deep-ITM contracts. Tightened from 85:
                                  # post-mortem on 12APR06:15 showed 67-82¢ entries
                                  # accounted for most losses in chop.

  # Settlement lock — allow late-window entries when outcome is near-certain
  # BRTI settles on 60s trailing average; with 30s left, half is locked in.
  # When BSM says ≥88% and BTC is well clear of strike, enter even <60s.
  settlement_lock_enabled: true
  settlement_lock_min_seconds: 20
  settlement_lock_max_seconds: 60
  settlement_lock_min_prob: 0.88
  settlement_lock_min_confidence: 0.50

  # GTC order management
  # Early-window entries post GTC post_only at mid-1¢ (0% maker fee).
  # If unfilled after gtc_escalate_seconds, cancel and retry as IOC.
  # 8s: tight escalation. With the strong-signal override in personas.py,
  # GTC now only handles genuinely quiet markets where 8s of patience is
  # plenty and the old 12s was just alpha decay.
  gtc_escalate_seconds: 8.0
  slippage_cents: 2               # IOC slippage above current ask (adaptive by vol)

  # Market making — runs in early window when spread ≥ mm_min_spread_cents
  # Posts both YES and NO sides with GTC post_only; earns spread at 0% fee.
  mm_min_spread_cents: 5
  mm_contracts_per_side: 2        # start small; raise after validating edge
  mm_max_inventory: 8             # stop posting overloaded side above this (~$4 one-sided)
  mm_cancel_before_seconds: 120   # cancel all MM orders with <2 min to settlement
  mm_quote_offset_cents: 2        # post this many cents inside best bid/ask

  # Exit rules (simplified — no trailing stop, no profit decay)
  #   Rule 1: Pure arb pairs always hold to settlement ($1.00 guaranteed — never cut)
  #   Rule 2: Flip if model reverses with strong edge AND enough time remains
  #   Rule 3: Cut losses only when close to settlement (don't get trapped near zero)
  #   Rule 4: Everything else → hold to $1.00 settlement
  stop_loss_pct: 0.40             # cut if losing >40% AND <stop_loss_min_seconds left
  stop_loss_min_seconds: 240      # 4 min: only cut losses inside last 4 minutes
  emergency_stop_pct: 0.65        # cut IMMEDIATELY (any time) if losing >65%
  reversal_min_edge: 0.10         # 10% edge required to flip sides
  reversal_min_seconds: 300       # only flip with >5 min left

  # Position sizing (tuned for $100 starting balance)
  # Early window (GTC): quarter-Kelly — patient entries, time uncertainty higher
  # Prime window (IOC): half-Kelly — high conviction, short window
  # Sizer also hard-caps at 20% of bankroll internally (see btc15/strategy/sizer.py)
  kelly_fraction_early: 0.25
  kelly_fraction_prime: 0.50
  kelly_fraction_strong: 0.75     # 3/4-Kelly for very strong signals (conf≥0.65, edge≥0.08)
  max_single_trade_usd: 12.00     # hard cap per trade (~12% of $100 bankroll)

  # Pyramiding — add to winning positions when model still agrees
  pyramid_enabled: true
  pyramid_min_pnl_pct: 0.10       # position must be ≥10% profitable
  pyramid_min_confidence: 0.55
  pyramid_min_edge: 0.05
  pyramid_min_seconds: 300         # ≥5 min left to pyramid
  pyramid_max_adds: 1              # max 1 add per position

  # Stop/whipsaw cooldowns — the 12APR06:15 session had one market
  # take 4 losing trades in 10 minutes; these prevent re-entering chop.
  stop_cooldown_seconds: 90         # entry lockout after a stop-loss (was 45)
  reversal_cooldown_seconds: 60     # entry lockout after any reversal exit

  # GTC→IOC escalation drift gate. When the resting GTC didn't fill and the
  # IOC would now have to cross far above signal-time mid, we're chasing
  # informed flow. Halve or skip depending on how bad the drift is.
  escalation_drift_halve_cents: 2   # drift > 2¢ beyond slippage → halve contracts
  escalation_drift_skip_cents: 5    # drift > 5¢                  → skip IOC entirely

  # Reversal re-entry: require the live orderbook imbalance to actually
  # confirm the flip direction. Prevents taking reversal exits for profit
  # then immediately losing the re-entry on the same noisy market.
  reversal_require_orderbook_confirm: true
  reversal_orderbook_min_dev: 0.10  # |prob_orderbook - 0.5| ≥ this in flip direction

  # Arbitrage — always highest priority when YES+NO < 98¢
  min_arb_cents: 2                # minimum profit per pair in cents
  max_arb_contracts: 5            # ~$2.50–4.90 per arb pair on $100 bankroll

risk:
  max_open_positions: 3           # 3 × $12 = $36 max simultaneous exposure (36%)
  max_trade_usd: 12.00            # matches trader.max_single_trade_usd
  max_position_per_market_usd: 12.00
  daily_loss_limit_usd: 15.00     # stop trading if down $15 on the day (15% of $100)
  kelly_fraction: 0.25
  min_trade_usd: 0.50             # Kalshi practical minimum
  win_rate_lookback: 20
  win_rate_min: 0.40              # halt if recent win rate drops below 40%

logging:
  level: "INFO"
  log_file: "logs/bot.log"
  trade_log_file: "logs/trades.csv"
  max_log_size_mb: 50

database:
  path: "data/btc15.db"
